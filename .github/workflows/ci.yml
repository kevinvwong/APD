name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Build requires a DB connection for server components.
          # Add DATABASE_URL and ANTHROPIC_API_KEY in repo Settings → Secrets.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Check search index is not stale
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^fms/\|\.md$"; then
            echo "⚠️  FM content changed. If field manual text was updated, re-run: npm run search:index"
          fi
